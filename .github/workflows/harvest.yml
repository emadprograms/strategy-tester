name: Harvest Economic Calendar

on:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight UTC
  workflow_dispatch: # Allow manual triggers
    inputs:
      start_date:
        description: 'Start Date (YYYY-MM-DD)'
        required: false
        default: ''
      end_date:
        description: 'End Date (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  harvest-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install finnhub-python pandas libsql-client pytz python-dotenv

      - name: Fetch and Store Economic Data
        env:
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.start_date }}" != "" ] && [ "${{ github.event.inputs.end_date }}" != "" ]; then
            python scripts/fetch_economy.py --start ${{ github.event.inputs.start_date }} --end ${{ github.event.inputs.end_date }}
          else
            python scripts/fetch_economy.py
          fi
